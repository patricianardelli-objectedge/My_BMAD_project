<?xml version="1.0" encoding="UTF-8"?>
<!-- Blind Date Book — minimal vector logo
     - Deep navy stroke, soft blush heart, muted gold accent
     - Scalable line-art open book forming a subtle heart
-->
<svg xmlns="http://www.w3.org/2000/svg" width="600" height="240" viewBox="0 0 600 240" role="img" aria-labelledby="logoTitle logoDesc">
  <title id="logoTitle">Blind Date Book logo</title>
  <desc id="logoDesc">Stylized open book forming a heart, line art in deep navy with blush and gold accents.</desc>
  <defs>
    <style>
      .stroke { fill: none; stroke: #1E2A44; stroke-width: 6; stroke-linecap: round; stroke-linejoin: round; }
      .heart-fill { fill: #E8B4BC; opacity: 0.95; }
      .accent { fill: #C9A227; }
    </style>
  </defs>

  <!-- left book page -->
  <path class="stroke" d="M80 200 C150 160, 210 140, 300 140" />
  <!-- right book page -->
  <path class="stroke" d="M520 200 C450 160, 390 140, 300 140" />

  <!-- spine subtle line -->
  <path class="stroke" d="M300 140 L300 60" />

  <!-- heart shape formed by inner page curves (blush fill, softened) -->
  <path class="heart-fill" d="M300 78
      C285 58, 240 54, 220 84
      C200 114, 260 150, 300 180
      C340 150, 400 114, 380 84
      C360 54, 315 58, 300 78 Z" />

  <!-- fine navy outline for heart -->
  <path class="stroke" d="M300 78
      C285 58, 240 54, 220 84
      C200 114, 260 150, 300 180
      C340 150, 400 114, 380 84
      C360 54, 315 58, 300 78 Z" />

  <!-- muted gold bookmark accent -->
  <g transform="translate(320,20)">
    <rect x="-6" y="-6" width="12" height="40" rx="3" class="accent" />
    <path d="M0 34 L0 46 L6 40 L0 34" fill="#C9A227" />
  </g>

</svg>
